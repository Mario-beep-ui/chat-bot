<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot DeepSeek</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #001510);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.8;
        }
        
        .api-key-info {
            background: rgba(255, 215, 0, 0.2);
            border-left: 4px solid gold;
            padding: 10px;
            margin-top: 15px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .api-key-info strong {
            color: gold;
        }
        
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(10, 15, 30, 0.7);
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .user-message {
            align-items: flex-end;
        }
        
        .bot-message {
            align-items: flex-start;
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            position: relative;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-bubble {
            background: linear-gradient(135deg, #4e54c8, #8f94fb);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .bot-bubble {
            background: rgba(30, 30, 50, 0.8);
            color: #e0e0ff;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(100, 100, 200, 0.3);
        }
        
        .message-info {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .message-info i {
            margin-right: 8px;
            font-size: 16px;
        }
        
        .input-container {
            display: flex;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #user-input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        #user-input:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
        }
        
        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        #send-button {
            background: linear-gradient(135deg, #4e54c8, #8f94fb);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-left: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        
        #send-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.7);
        }
        
        #send-button:disabled {
            background: rgba(100, 100, 150, 0.5);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px 15px;
            background: rgba(30, 30, 50, 0.8);
            border-radius: 20px;
            margin: 10px 0;
            width: fit-content;
        }
        
        .typing-indicator span {
            height: 10px;
            width: 10px;
            background: #e0e0ff;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.3s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .timestamp {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 5px;
        }
        
        @media (max-width: 600px) {
            .chat-container {
                height: 400px;
            }
            
            .message-bubble {
                max-width: 85%;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> Chatbot DeepSeek</h1>
          
            
        </div>
        
        <div class="chat-container" id="chat-container">
            <!-- Mensajes aparecerán aquí -->
            <div class="message bot-message">
                <div class="message-info">
                    <i class="fas fa-robot"></i> DeepSeek Bot
                </div>
                <div class="message-bubble bot-bubble">
                    ¡Hola!  ¿En qué puedo ayudarte hoy?
                </div>
                <div class="timestamp">Ahora</div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje..." autocomplete="off">
            <button id="send-button">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        
        const apiKey = 'sk-646a5b86d1de4ee186dfac833541452b';
        
        // Elementos del DOM
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const typingIndicator = document.getElementById('typing-indicator');
        
        // Función para agregar un mensaje al chat
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;
            
            const messageInfo = document.createElement('div');
            messageInfo.className = 'message-info';
            
            const messageBubble = document.createElement('div');
            messageBubble.className = `message-bubble ${role}-bubble`;
            messageBubble.innerHTML = content;
            
            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = getCurrentTime();
            
            if (role === 'user') {
                messageInfo.innerHTML = '<i class="fas fa-user"></i> Tú';
            } else {
                messageInfo.innerHTML = '<i class="fas fa-robot"></i> DeepSeek Bot';
            }
            
            messageDiv.appendChild(messageInfo);
            messageDiv.appendChild(messageBubble);
            messageDiv.appendChild(timestamp);
            chatContainer.appendChild(messageDiv);
            
            // Scroll al final del chat
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // Obtener hora actual
        function getCurrentTime() {
            const now = new Date();
            return `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        }
        
        // Función para enviar mensaje a la API
        async function sendMessageToAPI(message) {
            showTypingIndicator();
            
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "user", content: message }],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });
                
                const data = await response.json();
                hideTypingIndicator();
                
                if (data.choices && data.choices.length > 0) {
                    return data.choices[0].message.content;
                } else {
                    return "Lo siento, no pude procesar tu solicitud. Intenta nuevamente.";
                }
            } catch (error) {
                hideTypingIndicator();
                console.error("Error:", error);
                return "Hubo un error al comunicarse con la API. Verifica tu conexión o API key.";
            }
        }
        
        // Mostrar indicador de escritura
        function showTypingIndicator() {
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // Ocultar indicador de escritura
        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }
        
        // Manejar envío de mensaje
        async function handleSendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // Deshabilitar entrada temporalmente
            userInput.value = '';
            userInput.disabled = true;
            sendButton.disabled = true;
            
            // Agregar mensaje del usuario
            addMessage('user', message);
            
            // Obtener respuesta del bot
            const botResponse = await sendMessageToAPI(message);
            addMessage('bot', botResponse);
            
            // Habilitar entrada nuevamente
            userInput.disabled = false;
            sendButton.disabled = false;
            userInput.focus();
        }
        
        // Event Listeners
        sendButton.addEventListener('click', handleSendMessage);
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSendMessage();
            }
        });
        
        // Enfoque automático en el input
        window.onload = () => {
            userInput.focus();
        };
    </script>
</body>
</html>
