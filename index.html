<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot DeepSeek</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Root variables for theme colors */
        :root {
            /* DeepSeek Dark Theme */
            --bg-color: #1A1A1A; /* Very dark background */
            --container-bg: #2C2C2C; /* Slightly lighter dark for container */
            --header-bg: #222222; /* Darker header */
            --text-color: #E0E0E0; /* Light grey text */
            --header-text-color: #FFFFFF; /* White header text */
            --api-info-bg: rgba(70, 130, 180, 0.1); /* Steel Blue tint */
            --api-info-border: #4682B4; /* Steel Blue */
            --chat-bg: #222222; /* Dark background for chat area */
            --user-bubble-bg: linear-gradient(135deg, #4A4A4A, #3A3A3A); /* Dark grey gradient for user */
            --user-bubble-text: #FFFFFF; /* White text for user bubble */
            --bot-bubble-bg: #3A3A3A; /* Slightly lighter dark for bot bubble */
            --bot-bubble-text: #E0E0E0; /* Light grey text for bot bubble */
            --bot-bubble-border: rgba(255, 255, 255, 0.1); /* Subtle white border */
            --input-container-bg: #222222; /* Dark input container */
            --input-border-top: rgba(255, 255, 255, 0.05); /* Very subtle border */
            --input-bg: #3A3A3A; /* Dark grey input field */
            --input-text: #FFFFFF; /* White input text */
            --input-placeholder: #A0A0A0; /* Medium grey placeholder */
            --input-focus-shadow: 0 0 10px rgba(70, 130, 180, 0.5); /* Steel Blue shadow */
            --send-button-bg: #007BFF; /* Bright blue send button */
            --send-button-text: white;
            --send-button-hover-shadow: 0 0 15px rgba(0, 123, 255, 0.7);
            --send-button-disabled-bg: rgba(0, 123, 255, 0.3);
            --typing-indicator-bg: #3A3A3A;
            --typing-indicator-dot: #E0E0E0;
            --timestamp-color: #A0A0A0;
            --theme-toggle-color: #FFFFFF;
            --theme-toggle-hover-color: #007BFF; /* Blue on hover */
            --feature-button-bg: #6A0DAD; /* Dark purple for feature buttons */
            --feature-button-text: white;
            --feature-button-hover-shadow: 0 0 15px rgba(106, 13, 173, 0.7);
            --feature-button-disabled-bg: rgba(106, 13, 173, 0.3);
        }

        /* Light Theme Overrides (White, Blue, Black) - Kept from previous iteration */
        body.light-theme {
            --bg-color: #E0F2F7; /* Light Blue Background */
            --container-bg: #FFFFFF; /* White Container */
            --header-bg: #007BFF; /* Blue Header */
            --text-color: #333333; /* Dark Grey/Black Text */
            --header-text-color: #FFFFFF; /* White Header Text */
            --api-info-bg: rgba(0, 123, 255, 0.1); /* Light Blue for API info */
            --api-info-border: #007BFF; /* Blue border */
            --chat-bg: #FFFFFF; /* White Chat Background */
            --user-bubble-bg: #007BFF; /* Blue User Bubble */
            --user-bubble-text: #FFFFFF; /* White User Bubble Text */
            --bot-bubble-bg: #F0F8FF; /* Very Light Blue Bot Bubble */
            --bot-bubble-text: #333333; /* Dark Grey/Black Bot Bubble Text */
            --bot-bubble-border: #ADD8E6; /* Light Blue Border */
            --input-container-bg: #F8F8F8; /* Light Grey Input Container */
            --input-border-top: #CCCCCC; /* Light Grey Border */
            --input-bg: #E9F5F9; /* Very Light Blue Input Field */
            --input-text: #333333; /* Dark Grey/Black Input Text */
            --input-placeholder: #666666; /* Grey Placeholder */
            --input-focus-shadow: 0 0 10px rgba(0, 123, 255, 0.2); /* Blue Shadow */
            --send-button-bg: #007BFF; /* Blue Send Button */
            --send-button-text: #FFFFFF; /* White Send Button Text */
            --send-button-hover-shadow: 0 0 15px rgba(0, 123, 255, 0.4); /* Blue Shadow */
            --send-button-disabled-bg: #B0C4DE; /* Light Blue Disabled */
            --typing-indicator-bg: #F0F8FF; /* Very Light Blue Typing Indicator */
            --typing-indicator-dot: #007BFF; /* Blue Dots */
            --timestamp-color: #666666; /* Grey Timestamp */
            --theme-toggle-color: #FFFFFF; /* White Toggle Icon */
            --theme-toggle-hover-color: #0056b3; /* Darker Blue on Hover */
            --feature-button-bg: #0056b3; /* Darker Blue for Feature Buttons */
            --feature-button-text: #FFFFFF; /* White Feature Button Text */
            --feature-button-hover-shadow: 0 0 15px rgba(0, 86, 179, 0.4); /* Darker Blue Shadow */
            --feature-button-disabled-bg: #B0C4DE; /* Light Blue Disabled */
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            transition: background 0.5s ease;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid var(--input-border-top);
            display: flex;
            flex-direction: column;
            height: 80vh;
            min-height: 500px;
        }

        .header {
            background: var(--header-bg);
            color: var(--header-text-color);
            padding: 20px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid var(--input-border-top);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            margin: 0;
            flex-grow: 1;
        }

        .api-key-info {
            background: var(--api-info-bg);
            border-left: 4px solid var(--api-info-border);
            padding: 10px;
            margin-top: 15px;
            border-radius: 4px;
            font-size: 14px;
            text-align: left;
            color: var(--text-color);
        }

        .api-key-info strong {
            color: var(--api-info-border);
        }

        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            flex-direction: column;
        }

        .user-message {
            align-items: flex-end;
        }

        .bot-message {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 15px; /* Slightly less rounded for DeepSeek look */
            position: relative;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-bubble {
            background: var(--user-bubble-bg);
            color: var(--user-bubble-text);
            border-bottom-right-radius: 5px; /* Sharp corner on one side */
        }

        .bot-bubble {
            background: var(--bot-bubble-bg);
            color: var(--bot-bubble-text);
            border-bottom-left-radius: 5px; /* Sharp corner on one side */
            border: 1px solid var(--bot-bubble-border);
        }

        .message-info {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--timestamp-color);
        }

        .message-info i {
            margin-right: 8px;
            font-size: 16px;
        }

        .input-container {
            display: flex;
            flex-wrap: wrap;
            padding: 15px;
            background: var(--input-container-bg);
            border-top: 1px solid var(--input-border-top);
            gap: 10px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 25px; /* Slightly less rounded */
            background: var(--input-bg);
            color: var(--input-text);
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            min-width: 150px;
        }

        #user-input:focus {
            background: var(--input-bg); /* Keep background consistent */
            box-shadow: var(--input-focus-shadow);
        }

        #user-input::placeholder {
            color: var(--input-placeholder);
        }

        #send-button, .feature-button {
            background: var(--send-button-bg);
            color: var(--send-button-text);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        #send-button:hover, .feature-button:hover {
            transform: scale(1.05);
            box-shadow: var(--send-button-hover-shadow);
        }

        #send-button:disabled, .feature-button:disabled {
            background: var(--send-button-disabled-bg);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .feature-button {
            background: var(--feature-button-bg);
            font-size: 14px;
            border-radius: 25px;
            padding: 0 15px;
            width: auto;
            height: 45px;
        }

        .feature-button:hover {
            box-shadow: var(--feature-button-hover-shadow);
        }

        .typing-indicator {
            display: none;
            padding: 10px 15px;
            background: var(--typing-indicator-bg);
            border-radius: 20px;
            margin: 10px 0;
            width: fit-content;
            color: var(--bot-bubble-text);
            align-self: flex-start;
        }

        .typing-indicator span {
            height: 10px;
            width: 10px;
            background: var(--typing-indicator-dot);
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.3s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .timestamp {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
            color: var(--timestamp-color);
        }

        /* Theme Toggle Button */
        #theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--theme-toggle-color);
            transition: color 0.3s ease;
            padding: 0 10px;
        }

        #theme-toggle:hover {
            color: var(--theme-toggle-hover-color);
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .container {
                height: 90vh;
            }
            .chat-container {
                padding: 15px;
            }
            .message-bubble {
                max-width: 90%;
            }
            .header h1 {
                font-size: 22px;
            }
            #user-input {
                padding: 12px;
                font-size: 14px;
            }
            #send-button {
                width: 45px;
                height: 45px;
                font-size: 16px;
            }
            .feature-button {
                height: 40px;
                font-size: 13px;
                padding: 0 12px;
            }
            .input-container {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                border-radius: 15px;
            }
            .header {
                padding: 15px;
            }
            .header h1 {
                font-size: 20px;
            }
            .chat-container {
                padding: 10px;
            }
            .message-bubble {
                max-width: 100%;
                padding: 10px 15px;
            }
            .message-info {
                font-size: 12px;
            }
            .timestamp {
                font-size: 10px;
            }
            #user-input {
                padding: 10px;
                font-size: 13px;
            }
            #send-button {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }
            .feature-button {
                height: 35px;
                font-size: 12px;
                padding: 0 10px;
            }
            .input-container {
                flex-direction: column;
                align-items: stretch;
            }
            .input-container #user-input,
            .input-container #send-button,
            .input-container .feature-button {
                width: 100%;
                margin-left: 0;
            }
            .input-container #send-button {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> IA by Mario </h1>
            <button id="theme-toggle" aria-label="Toggle theme">
                <i class="fas fa-sun"></i> <!-- Sun icon for light mode -->
            </button>
        </div>

        <div class="chat-container" id="chat-container">
            <!-- Initial bot message -->
            <div class="message bot-message">
                <div class="message-info">
                    <i class="fas fa-robot"></i> Mar-IA 
                </div>
                <div class="message-bubble bot-bubble">
                    ¡Hola!, Soy una IA creada por Mario Vazquez. <br> ¿En qué puedo ayudarte hoy?
                </div>
                <div class="timestamp">Ahora</div>
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje..." autocomplete="off">
            <button id="summarize-button" class="feature-button">
                Summarize Chat ✨
            </button>
            <button id="creative-button" class="feature-button">
                Creative Response ✨
            </button>
            <button id="send-button">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
    
        const apiKey = 'sk-646a5b86d1de4ee186dfac833541452b'; 

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const summarizeButton = document.getElementById('summarize-button');
        const creativeButton = document.getElementById('creative-button');
        const typingIndicator = document.getElementById('typing-indicator');
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Chat history for API context
        let chatHistory = [];

        // Function to add a message to the chat display
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;

            const messageInfo = document.createElement('div');
            messageInfo.className = 'message-info';

            const messageBubble = document.createElement('div');
            messageBubble.className = `message-bubble ${role}-bubble`;
            messageBubble.innerHTML = content;

            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = getCurrentTime();

            if (role === 'user') {
                messageInfo.innerHTML = '<i class="fas fa-user"></i> Tú';
            } else {
                messageInfo.innerHTML = '<i class="fas fa-robot"></i> Mar-IA'; // Changed bot name
            }

            messageDiv.appendChild(messageInfo);
            messageDiv.appendChild(messageBubble);
            messageDiv.appendChild(timestamp);
            chatContainer.appendChild(messageDiv);

            // Scroll to the bottom of the chat
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Get current time in HH:MM format
        function getCurrentTime() {
            const now = new Date();
            return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        }

        // Function to send message to DeepSeek API
        async function sendMessageToAPI(messagesToSend, temperature = 0.7, maxTokens = 1000) {
            showTypingIndicator();
            disableInputAndButtons(true);

            const payload = {
                model: "deepseek-chat", // Specify the DeepSeek model
                messages: messagesToSend,
                temperature: temperature,
                max_tokens: maxTokens // DeepSeek uses max_tokens
            };

            try {
                const apiUrl = 'https://api.deepseek.com/v1/chat/completions'; // DeepSeek API endpoint
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                hideTypingIndicator();
                disableInputAndButtons(false);

                if (result.choices && result.choices.length > 0 &&
                    result.choices[0].message && result.choices[0].message.content) {
                    return result.choices[0].message.content;
                } else {
                    console.error("DeepSeek API response structure unexpected:", result);
                    return "Lo siento, no pude procesar tu solicitud. Intenta nuevamente. (Error de API de DeepSeek)";
                }
            } catch (error) {
                hideTypingIndicator();
                disableInputAndButtons(false);
                console.error("Error communicating with DeepSeek API:", error);
                return "Hubo un error al comunicarse con la API de DeepSeek. Verifica tu conexión o clave API.";
            }
        }

        // Show typing indicator
        function showTypingIndicator() {
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Hide typing indicator
        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }

        // Disable/Enable input and buttons
        function disableInputAndButtons(disabled) {
            userInput.disabled = disabled;
            sendButton.disabled = disabled;
            summarizeButton.disabled = disabled;
            creativeButton.disabled = disabled;
        }

        // Handle message submission
        async function handleSendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = ''; // Clear input immediately
            addMessage('user', message); // Add user message to display

            // DeepSeek API expects messages in a specific format for history
            chatHistory.push({ role: "user", content: message });

            // Get bot response and add to display
            const botResponse = await sendMessageToAPI(chatHistory);
            addMessage('bot', botResponse);

            // Add bot response to chat history
            chatHistory.push({ role: "assistant", content: botResponse }); // DeepSeek uses 'assistant' for bot role

            userInput.focus();
        }

        // Handle summarize chat feature
        async function handleSummarizeChat() {
            if (chatHistory.length === 0) {
                addMessage('bot', "No hay conversación para resumir aún.");
                return;
            }

            // Create a prompt for summarization using the current chat history
            const summarizePrompt = [
                { role: "user", content: "Por favor, resume la siguiente conversación de manera concisa y clara:" },
                ...chatHistory
            ];

            const summary = await sendMessageToAPI(summarizePrompt, 0.4, 500); // Lower temperature for more factual summary
            addMessage('bot', `**Resumen de la conversación:**\n\n${summary}`);
        }

        // Handle creative response feature
        async function handleCreativeResponse() {
            let creativeInput = userInput.value.trim();
            if (!creativeInput && chatHistory.length > 0) {
                // If input is empty, use the last user message from history
                const lastUserMessage = chatHistory.slice().reverse().find(msg => msg.role === 'user');
                if (lastUserMessage) {
                    creativeInput = lastUserMessage.content; // DeepSeek uses 'content'
                }
            }

            if (!creativeInput) {
                addMessage('bot', "Por favor, escribe algo en el cuadro de texto o ten al menos un mensaje en el historial para generar una respuesta creativa.");
                return;
            }

            // Clear input if it was used
            userInput.value = '';

            const creativePrompt = [
                { role: "user", content: `Basado en el siguiente texto, genera una respuesta creativa (ej. una historia corta, un poema, una reflexión, etc.): "${creativeInput}"` }
            ];

            const creativeResponse = await sendMessageToAPI(creativePrompt, 0.9, 800); // Higher temperature for more creativity
            addMessage('bot', `**Respuesta Creativa:**\n\n${creativeResponse}`);
        }


        // Theme toggle logic
        function toggleTheme() {
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>'; // Sun icon for dark mode (to switch to light)
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-theme');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>'; // Moon icon for light mode (to switch to dark)
                localStorage.setItem('theme', 'light');
            }
        }

        // Load theme from local storage on page load
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                body.classList.add('light-theme');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                // Default to dark theme if no preference or 'dark' saved
                body.classList.remove('light-theme');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
        }

        // Event Listeners
        sendButton.addEventListener('click', handleSendMessage);
        summarizeButton.addEventListener('click', handleSummarizeChat);
        creativeButton.addEventListener('click', handleCreativeResponse);

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                handleSendMessage();
            }
        });

        themeToggle.addEventListener('click', toggleTheme);

        // Initial setup on window load
        window.onload = () => {
            loadTheme();
            userInput.focus();
            // Initialize chat history with the initial bot message
            chatHistory.push({ role: "assistant", content: "¡Hola!, Soy una IA creada por Mario Vazquez. <br> ¿En qué puedo ayudarte hoy?" }); // Updated initial message
        };
    </script>
</body>
</html>
